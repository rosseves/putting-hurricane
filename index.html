<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chipping Challenge AR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100dvh; overflow: hidden; color: white;
    user-select: none; -webkit-user-select: none;
  }
  #app { position: relative; width: 100vw; height: 100dvh; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70px; height: 70px; pointer-events: none; z-index: 9;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.85);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  .crosshair-ring { position: absolute; inset: 10px; border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; }

  #ball-cursor {
    position: fixed; width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 35% 32%, #ffffff 0%, #d8d8d8 60%, #bbbbbb 100%);
    box-shadow: 0 4px 14px rgba(0,0,0,0.55), inset 0 -2px 4px rgba(0,0,0,0.12);
    pointer-events: none; z-index: 20;
    transform: translate(-50%, -50%);
    display: none;
    border: 1.5px solid rgba(255,255,255,0.6);
  }
  #ball-cursor::before {
    content: ''; position: absolute; inset: 7px;
    border-radius: 50%; border: 1px solid rgba(160,160,160,0.35);
  }

  #hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 52px 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
    z-index: 10; pointer-events: none;
  }
  .hud-pill {
    background: rgba(0,0,0,0.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 7px 14px; font-size: 13px; font-weight: 600;
  }
  .hud-pill.green { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); color: #4ade80; }

  #instruction {
    position: absolute; top: 128px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; text-align: center;
    z-index: 10; pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
  }

  #panel-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 55%, transparent 100%);
    z-index: 10;
  }
  #ball-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; max-height: 200px; overflow-y: auto; }
  .ball-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 9px 14px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .ball-num { width:26px; height:26px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#166534; flex-shrink:0; }
  .ball-label { font-size:13px; color:#9ca3af; flex:1; }
  .ball-dist  { font-size:16px; font-weight:700; }
  .ball-sg { font-size:12px; font-weight:600; padding:3px 8px; border-radius:8px; }
  .ball-sg.pos { background:rgba(34,197,94,0.2); color:#4ade80; }
  .ball-sg.neg { background:rgba(239,68,68,0.2); color:#f87171; }
  .ball-sg.neu { background:rgba(156,163,175,0.2); color:#9ca3af; }

  .btn-row { display:flex; gap:10px; }
  .btn-action {
    flex:1; border:none; border-radius:14px; padding:15px;
    font-size:15px; font-weight:600; cursor:pointer;
    -webkit-tap-highlight-color:transparent; transition:transform 0.1s, opacity 0.1s;
  }
  .btn-action:active { transform:scale(0.96); }
  .btn-action:disabled { opacity:0.3; }
  .btn-lock { background:linear-gradient(135deg,#22c55e,#16a34a); color:white; }
  .btn-ball { background:rgba(255,255,255,0.13); border:1px solid rgba(255,255,255,0.2)!important; color:white; }
  .btn-reset { flex:0 0 auto; padding:15px 18px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3)!important; color:#f87171; display:none; }
  #scale-notice { font-size:11px; color:rgba(255,255,255,0.22); text-align:center; margin-top:8px; }

  #lock-flash { position:absolute; inset:0; background:rgba(34,197,94,0.18); pointer-events:none; opacity:0; z-index:8; transition:opacity 0.08s; }

  #start-screen {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:linear-gradient(160deg,#0d1f12 0%,#0a0a0a 100%);
    z-index:100; gap:12px; padding:32px;
  }
  .logo { width:72px; height:72px; background:linear-gradient(135deg,#22c55e,#16a34a); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; margin-bottom:8px; box-shadow:0 8px 32px rgba(34,197,94,0.35); }
  #start-screen h1 { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
  #start-screen p  { font-size:15px; color:#6b7280; text-align:center; line-height:1.6; max-width:280px; }
  .btn-primary { margin-top:16px; background:linear-gradient(135deg,#22c55e,#16a34a); color:white; border:none; border-radius:16px; padding:16px 44px; font-size:17px; font-weight:600; cursor:pointer; box-shadow:0 4px 20px rgba(34,197,94,0.4); -webkit-tap-highlight-color:transparent; transition:transform 0.1s; }
  .btn-primary:active { transform:scale(0.97); }

  #summary { position:absolute; inset:0; background:linear-gradient(160deg,#0d1f12 0%,#0a0a0a 100%); z-index:100; display:none; flex-direction:column; padding:56px 20px 40px; overflow-y:auto; }
  #summary h2 { font-size:24px; font-weight:700; margin-bottom:4px; }
  #summary .subtitle { font-size:14px; color:#6b7280; margin-bottom:24px; }
  .summary-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:16px; margin-bottom:12px; }
  .summary-card h3 { font-size:12px; color:#6b7280; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .sg-total { font-size:52px; font-weight:800; letter-spacing:-2px; }
  .sg-total.pos { color:#4ade80; } .sg-total.neg { color:#f87171; } .sg-total.neu { color:#9ca3af; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
  .summary-row:last-child { border-bottom:none; }
  .summary-row .label { font-size:14px; color:#9ca3af; }
  .summary-row .value { font-size:15px; font-weight:600; }
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="lock-flash"></div>
  <div id="crosshair"><div class="crosshair-ring"></div></div>
  <div id="ball-cursor"></div>

  <div id="hud-top">
    <div class="hud-pill" id="hud-mode">📍 Aim at hole</div>
    <div class="hud-pill" id="hud-count">0 / 9 balls</div>
  </div>

  <div id="instruction">Aim crosshair at hole, tap Lock Hole</div>

  <div id="panel-bottom">
    <div id="ball-list"></div>
    <div class="btn-row">
      <button class="btn-action btn-lock" id="btn-lock">⛳ Lock Hole</button>
      <button class="btn-action btn-ball" id="btn-ball" disabled>🏌️ Mark Ball</button>
      <button class="btn-action btn-reset" id="btn-reset">↺ Reset</button>
    </div>
    <div id="scale-notice">POC · distances simulated · LiDAR depth replaces scale factor in v2</div>
  </div>

  <div id="start-screen">
    <div class="logo">⛳</div>
    <h1>Chipping Challenge</h1>
    <p>Lock the hole with the crosshair, then move the ball cursor to each shot and mark it.</p>
    <button class="btn-primary" id="btn-start">Start Measuring</button>
  </div>

  <div id="summary">
    <h2>Round Summary</h2>
    <p class="subtitle" id="summary-subtitle"></p>
    <div class="summary-card">
      <h3>Total Strokes Gained</h3>
      <div class="sg-total" id="sg-total-display">+0.0</div>
    </div>
    <div class="summary-card" id="summary-balls"></div>
    <button class="btn-primary" id="btn-new-round" style="width:100%;margin-top:4px">New Round</button>
  </div>
</div>

<script>
const state = {
  phase: 'locking',
  holePixel: null,
  balls: [],
  cursorX: 0, cursorY: 0,
  scaleFactor: 0.055,
};

const SG_TABLE = [
  {maxFt:1,exp:1.00},{maxFt:2,exp:1.03},{maxFt:3,exp:1.08},{maxFt:4,exp:1.15},
  {maxFt:6,exp:1.22},{maxFt:9,exp:1.35},{maxFt:12,exp:1.45},{maxFt:18,exp:1.58},
  {maxFt:24,exp:1.68},{maxFt:36,exp:1.80},{maxFt:60,exp:1.90},{maxFt:Infinity,exp:1.95},
];
function getExpectedPutts(ft) { for(const r of SG_TABLE){if(ft<=r.maxFt)return r.exp;} return 1.95; }
function calcSG(yards) {
  const ft = yards * 3;
  return +(2.40 - (1 + getExpectedPutts(ft))).toFixed(2);
}
function distPx(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const crosshair  = document.getElementById('crosshair');
const ballCursor = document.getElementById('ball-cursor');
const btnStart   = document.getElementById('btn-start');
const btnLock    = document.getElementById('btn-lock');
const btnBall    = document.getElementById('btn-ball');
const btnReset   = document.getElementById('btn-reset');
const btnNewRound= document.getElementById('btn-new-round');
const instruction= document.getElementById('instruction');
const hudMode    = document.getElementById('hud-mode');
const hudCount   = document.getElementById('hud-count');
const ballList   = document.getElementById('ball-list');
const lockFlash  = document.getElementById('lock-flash');
const startScreen= document.getElementById('start-screen');
const summary    = document.getElementById('summary');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      resizeCanvas();
      startScreen.style.display = 'none';
      updateUI(); draw();
    };
  } catch(e) {
    startScreen.style.display = 'none';
    canvas.style.background = 'linear-gradient(135deg,#1a3a1a 0%,#0d1a0d 100%)';
    document.getElementById('scale-notice').textContent = 'No camera — demo mode';
    resizeCanvas(); updateUI(); draw();
  }
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  state.cursorX = canvas.width / 2;
  state.cursorY = canvas.height / 2;
}
window.addEventListener('resize', resizeCanvas);

// Track pointer for ball cursor
function moveCursor(clientX, clientY) {
  state.cursorX = clientX;
  state.cursorY = clientY;
  if (state.phase === 'locked') {
    ballCursor.style.left = clientX + 'px';
    ballCursor.style.top  = clientY + 'px';
  }
}

document.addEventListener('touchmove',  e => { if(state.phase==='locked'){ e.preventDefault(); moveCursor(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});
document.addEventListener('touchstart', e => { if(state.phase==='locked'){ moveCursor(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:true});
document.addEventListener('mousemove',  e => moveCursor(e.clientX, e.clientY));

// Draw loop
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state.holePixel) drawHoleMarker(state.holePixel.x, state.holePixel.y);

  state.balls.forEach((ball, i) => {
    if (state.holePixel) drawDistanceLine(state.holePixel, ball, i);
    drawBallMarker(ball.x, ball.y, i + 1);
  });

  if (state.phase === 'locked') {
    // Dashed preview line from hole to cursor
    if (state.holePixel) {
      ctx.beginPath();
      ctx.moveTo(state.holePixel.x, state.holePixel.y);
      ctx.lineTo(state.cursorX, state.cursorY);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5,5]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Live distance label
      const px = distPx(state.holePixel, {x:state.cursorX, y:state.cursorY});
      const yards = px * state.scaleFactor;
      const ft = yards * 3;
      const label = ft < 12 ? `${ft.toFixed(1)} ft` : `${yards.toFixed(1)} yds`;
      const mx = (state.holePixel.x + state.cursorX) / 2;
      const my = (state.holePixel.y + state.cursorY) / 2;

      ctx.font = 'bold 13px -apple-system';
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.roundRect(mx - tw/2 - 8, my - 13, tw + 16, 26, 8);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, mx, my);
    }

    // Dashed ring around ball cursor position on canvas
    ctx.beginPath();
    ctx.arc(state.cursorX, state.cursorY, 22, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4,3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  requestAnimationFrame(draw);
}

function drawHoleMarker(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 25, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(34,197,94,0.45)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 17, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(34,197,94,0.92)';
  ctx.fill();

  ctx.font = '14px -apple-system';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⛳', x, y);

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 10px -apple-system';
  ctx.fillText('HOLE', x, y + 31);
}

function drawBallMarker(x, y, num) {
  ctx.beginPath();
  ctx.arc(x, y+2, 15, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  const grad = ctx.createRadialGradient(x-4, y-4, 1, x, y, 15);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#cccccc');
  ctx.beginPath();
  ctx.arc(x, y, 15, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.fillStyle = '#166534';
  ctx.font = 'bold 12px -apple-system';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(num, x, y);
}

function drawDistanceLine(hole, ball, idx) {
  const colors = ['#4ade80','#60a5fa','#f472b6','#fb923c','#a78bfa','#34d399','#fbbf24','#f87171','#818cf8'];
  const color = colors[idx % colors.length];

  ctx.beginPath();
  ctx.moveTo(hole.x, hole.y);
  ctx.lineTo(ball.x, ball.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.globalAlpha = 0.8;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  const mx = (hole.x + ball.x) / 2;
  const my = (hole.y + ball.y) / 2;
  const ft = ball.dist * 3;
  const label = ft < 12 ? `${ft.toFixed(1)} ft` : `${ball.dist.toFixed(1)} yds`;

  ctx.font = 'bold 12px -apple-system';
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.roundRect(mx-tw/2-6, my-11, tw+12, 22, 6);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, mx, my);
}

function flashGreen() {
  lockFlash.style.opacity = '1';
  setTimeout(() => lockFlash.style.opacity = '0', 180);
}

function updateUI() {
  hudCount.textContent = `${state.balls.length} / 9 balls`;

  if (state.phase === 'locking') {
    instruction.textContent = 'Aim crosshair at hole, tap Lock Hole';
    instruction.style.opacity = '1';
    hudMode.textContent = '📍 Aim at hole';
    hudMode.className = 'hud-pill';
    crosshair.style.display = 'block';
    ballCursor.style.display = 'none';
    btnLock.disabled = false;
    btnBall.disabled = true;
    btnReset.style.display = 'none';
  } else {
    instruction.textContent = 'Drag ball to each shot → tap Mark Ball';
    instruction.style.opacity = state.balls.length === 0 ? '1' : '0';
    hudMode.textContent = '✅ Hole locked';
    hudMode.className = 'hud-pill green';
    crosshair.style.display = 'none';
    ballCursor.style.display = 'block';
    ballCursor.style.left = (canvas.width / 2) + 'px';
    ballCursor.style.top  = (canvas.height / 2) + 'px';
    btnLock.disabled = true;
    btnBall.disabled = state.balls.length >= 9;
    btnReset.style.display = 'block';
  }

  ballList.innerHTML = '';
  state.balls.forEach((ball, i) => {
    const ft = ball.dist * 3;
    const distLabel = ft < 12 ? `${ft.toFixed(1)} ft` : `${ball.dist.toFixed(1)} yds`;
    const sgClass = ball.sg > 0 ? 'pos' : ball.sg < 0 ? 'neg' : 'neu';
    const row = document.createElement('div');
    row.className = 'ball-row';
    row.innerHTML = `
      <div class="ball-num">${i+1}</div>
      <div class="ball-label">Ball ${i+1}</div>
      <div class="ball-dist">${distLabel}</div>
      <div class="ball-sg ${sgClass}">${ball.sg>=0?'+':''}${ball.sg} SG</div>`;
    ballList.appendChild(row);
  });

  if (state.balls.length === 9) setTimeout(showSummary, 700);
}

btnStart.addEventListener('click', startCamera);

btnLock.addEventListener('click', () => {
  state.holePixel = { x: canvas.width/2, y: canvas.height/2 };
  state.phase = 'locked';
  state.cursorX = canvas.width/2;
  state.cursorY = canvas.height/2;
  flashGreen();
  updateUI();
});

btnBall.addEventListener('click', () => {
  if (!state.holePixel || state.balls.length >= 9) return;
  const px = distPx(state.holePixel, {x:state.cursorX, y:state.cursorY});
  const yards = px * state.scaleFactor;
  const sg = calcSG(yards);
  state.balls.push({x:state.cursorX, y:state.cursorY, dist:yards, sg});
  updateUI();
});

btnReset.addEventListener('click', () => {
  state.phase = 'locking';
  state.holePixel = null;
  state.balls = [];
  updateUI();
});

btnNewRound.addEventListener('click', () => {
  summary.style.display = 'none';
  state.phase = 'locking';
  state.holePixel = null;
  state.balls = [];
  updateUI();
});

function showSummary() {
  const totalSG = state.balls.reduce((s,b)=>s+b.sg,0).toFixed(2);
  const avgFt   = (state.balls.reduce((s,b)=>s+b.dist*3,0)/state.balls.length).toFixed(1);
  const best    = state.balls.reduce((a,b)=>a.dist<b.dist?a:b);

  document.getElementById('summary-subtitle').textContent =
    `9 balls · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;

  const sgNum = parseFloat(totalSG);
  const sgEl  = document.getElementById('sg-total-display');
  sgEl.textContent = sgNum>=0 ? `+${totalSG}` : totalSG;
  sgEl.className   = 'sg-total ' + (sgNum>0?'pos':sgNum<0?'neg':'neu');

  const sb = document.getElementById('summary-balls');
  sb.innerHTML = '<h3>Ball Breakdown</h3>';
  state.balls.forEach((b,i) => {
    const ft = b.dist*3;
    const label = ft<12 ? `${ft.toFixed(1)} ft` : `${b.dist.toFixed(1)} yds`;
    const sgClass = b.sg>0?'pos':b.sg<0?'neg':'neu';
    sb.innerHTML += `<div class="summary-row"><span class="label">Ball ${i+1}</span><span class="value">${label}</span><span class="ball-sg ${sgClass}">${b.sg>=0?'+':''}${b.sg} SG</span></div>`;
  });
  sb.innerHTML += `
    <div class="summary-row"><span class="label">Avg distance</span><span class="value">${avgFt} ft</span></div>
    <div class="summary-row"><span class="label">Best ball</span><span class="value">${(best.dist*3).toFixed(1)} ft</span></div>`;

  summary.style.display = 'flex';
}

resizeCanvas();
draw();
updateUI();
</script>
</body>
</html>
